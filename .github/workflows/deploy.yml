name: Deploy to InfinityFree

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-infinityfree
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, ctype, fileinfo, json, openssl, pdo, pdo_mysql, tokenizer, xml
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Create production environment file
        run: |
          cat > .env <<EOF
          APP_NAME="${{ secrets.APP_NAME || 'IT Inventara uzskaites sistema' }}"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}
          APP_TIMEZONE=Europe/Riga
          APP_LOCALE=lv
          APP_FALLBACK_LOCALE=lv
          APP_FAKER_LOCALE=lv_LV
          APP_MAINTENANCE_DRIVER=file
          BCRYPT_ROUNDS=12
          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_DEPRECATIONS_CHANNEL=null
          LOG_LEVEL=error
          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT || '3306' }}
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          SESSION_DRIVER=file
          SESSION_LIFETIME=120
          SESSION_ENCRYPT=false
          SESSION_PATH=/
          SESSION_DOMAIN=null
          SESSION_SECURE_COOKIE=true
          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync
          CACHE_STORE=file
          MEMCACHED_HOST=127.0.0.1
          REDIS_CLIENT=phpredis
          REDIS_HOST=127.0.0.1
          REDIS_PASSWORD=null
          REDIS_PORT=6379
          MAIL_MAILER=log
          MAIL_SCHEME=null
          MAIL_HOST=127.0.0.1
          MAIL_PORT=2525
          MAIL_USERNAME=null
          MAIL_PASSWORD=null
          MAIL_FROM_ADDRESS="noreply@example.com"
          MAIL_FROM_NAME="${{ secrets.APP_NAME || 'IT Inventara uzskaites sistema' }}"
          AWS_ACCESS_KEY_ID=
          AWS_SECRET_ACCESS_KEY=
          AWS_DEFAULT_REGION=us-east-1
          AWS_BUCKET=
          AWS_USE_PATH_STYLE_ENDPOINT=false
          VITE_APP_NAME="${{ secrets.APP_NAME || 'IT Inventara uzskaites sistema' }}"
          EOF

      - name: Deploy to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER || 'ftpupload.net' }}
          protocol: ftp
          port: 21
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /htdocs/
          dangerous-clean-slate: false
          exclude: |
            .git/**
            .github/**
            .vscode/**
            .idea/**
            node_modules/**
            tests/**
            database/**
            .phpunit.cache/**
            .fleet/**
            .zed/**
            package.json
            package-lock.json
            postcss.config.js
            tailwind.config.js
            vite.config.js
            phpunit.xml
            **/*.md
            **/*.log
            **/.DS_Store
            **/Thumbs.db
